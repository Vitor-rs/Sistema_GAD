# apps/backend/src/test/resources/application.properties
#
# Propriedades que só valem durante os testes.
# Spring Boot carrega este arquivo automaticamente quando o classpath
# de teste está ativo, sobrepondo os valores do application.properties
# principal de src/main/resources.

# Desliga a autoconfiguração do Redis durante os testes.
# Adicionaremos testcontainers-redis no Sprint 4 quando implementarmos cache.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Flyway funciona mesmo sem migrations (só cria a tabela de controle).
# baseline-on-migrate=true permite rodar em bancos não-vazios sem erro.
spring.flyway.baseline-on-migrate=true

# Logging mais econômico nos testes — menos ruído no console do Gradle.
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.boot.autoconfigure=WARN
