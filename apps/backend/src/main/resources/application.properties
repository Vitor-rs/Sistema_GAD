# apps/backend/src/main/resources/application.properties
#
# Configuração padrão da aplicação GAD backend.
# Todas as propriedades sensíveis ou que mudam entre ambientes usam a
# sintaxe ${VAR:default}, que lê da variável de ambiente primeiro e,
# se não encontrar, usa o valor após os dois pontos como default de dev.

spring.application.name=gad-backend

# --- Datasource (Postgres) ---
# Em dev local, o docker-compose vai subir Postgres em localhost:5432.
# Em CI/produção, DB_URL será sobrescrito por variável de ambiente.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gad}
spring.datasource.username=${DB_USERNAME:gad}
spring.datasource.password=${DB_PASSWORD:gad}

# --- JPA / Hibernate ---
# ddl-auto=validate é o modo profissional: o Hibernate apenas checa se o
# esquema bate com as entidades, sem alterar nada. Migrations ficam a cargo
# do Flyway. Evita o velho drama de "o Hibernate apagou minha tabela".
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- Redis (para cache no Sprint 4) ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Actuator ---
# Expomos apenas os endpoints essenciais. "shutdown" fica fora por segurança.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# --- SpringDoc OpenAPI ---
# Estes são os caminhos onde o contrato da API será publicado.
# O target Nx `export-openapi` vai baixar de /v3/api-docs durante o CI.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
